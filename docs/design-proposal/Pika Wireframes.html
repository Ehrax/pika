<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pika · wireframe explorations</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Architects+Daughter&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --display: 'Caveat', 'Marker Felt', cursive;
    --hand: 'Architects Daughter', 'Bradley Hand', cursive;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --paper: #fbf8f1;
    --paper-2: #f3eee2;
    --ink: #1f1d1b;
  }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--hand); }
  * { box-sizing: border-box; }
  body { overflow: hidden; }

  /* Brief — appears as a post-it style note inside the canvas. */
  .brief {
    width: 540px;
    background: #fff8d6;
    padding: 18px 22px;
    box-shadow: 0 2px 0 #1f1d1b22, 4px 8px 18px #1f1d1b18;
    transform: rotate(-1.2deg);
    border-radius: 2px;
  }
  .brief h1 {
    font-family: var(--display); font-size: 32px; margin: 0 0 6px;
  }
  .brief p { font-family: var(--hand); font-size: 13px; line-height: 1.55; margin: 4px 0; }
  .brief ul { padding-left: 18px; margin: 4px 0; }
  .brief li { font-family: var(--hand); font-size: 12px; line-height: 1.5; }
  .brief .meta { font-family: var(--mono); font-size: 10px; color: #7a7468; text-transform: uppercase; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="sketch-kit.jsx"></script>
  <script type="text/babel" src="storyboard-mac-a.jsx"></script>
  <script type="text/babel" src="storyboard-mac-b.jsx"></script>
  <script type="text/babel" src="storyboard-phone.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "showBrief": true,
      "wobble": true,
      "accent": true,
      "filledData": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Drive global filter strength and accent visibility from tweaks.
      React.useEffect(() => {
        const turb = document.querySelector('#wobble feTurbulence');
        const disp = document.querySelector('#wobble feDisplacementMap');
        if (disp) disp.setAttribute('scale', tweaks.wobble ? '1.4' : '0.0');
        document.documentElement.style.setProperty('--accent-on', tweaks.accent ? '1' : '0');
        if (!tweaks.accent) {
          document.documentElement.style.setProperty('filter', 'grayscale(1)');
        } else {
          document.documentElement.style.removeProperty('filter');
        }
      }, [tweaks.wobble, tweaks.accent]);

      const macW = 920, macH = 600;
      const phoneW = 300, phoneH = 620;

      return (
        <>
          <SketchFilters />
          <DesignCanvas background="#f3eee2">
            {tweaks.showBrief ? (
              <DCSection id="brief" title="Pika · invoicing for ehrax.dev" subtitle="wireframe explorations · low-fi · 2026-04-26">
                <DCArtboard id="brief-card" label="brief · read me first" width={580} height={520} style={{ background: 'transparent', boxShadow: 'none' }}>
                  <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div className="brief">
                      <div className="meta">brief · low-fi wireframes</div>
                      <h1>Pika.</h1>
                      <p><b>Goal.</b> A private, note-like billing app for ehrax.dev — capture little while working, automate paperwork later. Mac (3-pane) and iPhone (stacked).</p>
                      <p><b>Five storyboards below — each follows one task end-to-end.</b></p>
                      <ul>
                        <li><b>A · Mac · capture-first.</b> Sidebar/list/detail with inline add. Press <code style={{fontFamily:'var(--mono)'}}>+</code>, type two times, done.</li>
                        <li><b>B · Mac · dashboard-first.</b> Open to revenue + attention; ready bucket → confirm sheet → finalized invoice in one move.</li>
                        <li><b>D · iPhone · stacked capture.</b> Projects → Buckets → Detail → Add sheet → Ready.</li>
                        <li><b>E · iPhone · dashboard-first.</b> Today screen with KPIs; quick-add from any bucket; tap an overdue invoice to act.</li>
                      </ul>
                      <p style={{marginTop:10}}><b>Tweaks panel</b> (toolbar toggle): hide this brief, kill the wobble, drop the accent for pure B&amp;W, swap to empty data states.</p>
                      <p className="meta" style={{marginTop:10}}>note. window chrome and phone bezel are intentionally generic — not branded UI.</p>
                    </div>
                  </div>
                </DCArtboard>
              </DCSection>
            ) : null}

            <DCSection id="mac-a" title="A · Mac · capture-first" subtitle="open app → find bucket → type 10:00–12:00 → done. inline add, live totals, rate change re-totals.">
              <DCArtboard id="a1" label="1. open · empty day" width={macW} height={macH}><MacA1_Sidebar /></DCArtboard>
              <DCArtboard id="a2" label="2. bucket detail · filled" width={macW} height={macH}><MacA2_BucketDetail /></DCArtboard>
              <DCArtboard id="a3" label="3. inline add (press +)" width={macW} height={macH}><MacA3_InlineAdd /></DCArtboard>
              <DCArtboard id="a4" label="4. change rate 80 → 90" width={macW} height={macH}><MacA4_RateChange /></DCArtboard>
              <DCArtboard id="a5" label="5. mark ready" width={macW} height={macH}><MacA5_ReadyToInvoice /></DCArtboard>
            </DCSection>

            <DCSection id="mac-b" title="B · Mac · dashboard-first → invoice" subtitle="land on revenue + attention. open ready bucket → confirm → finalized.">
              <DCArtboard id="b1" label="1. dashboard" width={macW} height={macH}><MacB1_Dashboard /></DCArtboard>
              <DCArtboard id="b2" label="2. open ready bucket" width={macW} height={macH}><MacB2_ReadyBucket /></DCArtboard>
              <DCArtboard id="b3" label="3. confirm sheet · one screen" width={macW} height={macH}><MacB3_Confirm /></DCArtboard>
              <DCArtboard id="b4" label="4. finalized · PDF rendered" width={macW} height={macH}><MacB4_Finalized /></DCArtboard>
            </DCSection>

            <DCSection id="phone-d" title="D · iPhone · stacked capture" subtitle="projects → buckets → detail → add sheet → ready.">
              <DCArtboard id="d1" label="1. projects" width={phoneW} height={phoneH}><PhoneD1_Projects /></DCArtboard>
              <DCArtboard id="d2" label="2. buckets" width={phoneW} height={phoneH}><PhoneD2_Buckets /></DCArtboard>
              <DCArtboard id="d3" label="3. bucket detail · compact rows" width={phoneW} height={phoneH}><PhoneD3_BucketDetail /></DCArtboard>
              <DCArtboard id="d3b" label="3b. entry detail · long notes" width={phoneW} height={phoneH}><PhoneD3b_EntryDetail /></DCArtboard>
              <DCArtboard id="d4" label="4. add sheet (default path)" width={phoneW} height={phoneH}><PhoneD4_AddSheet /></DCArtboard>
              <DCArtboard id="d5" label="5. ready to invoice" width={phoneW} height={phoneH}><PhoneD5_Ready /></DCArtboard>
            </DCSection>

            <DCSection id="phone-e" title="E · iPhone · dashboard-first" subtitle="today screen with KPIs, quick-add any bucket, tap overdue to act.">
              <DCArtboard id="e1" label="1. today" width={phoneW} height={phoneH}><PhoneE1_Today /></DCArtboard>
              <DCArtboard id="e2" label="2. quick add (any bucket)" width={phoneW} height={phoneH}><PhoneE2_QuickAdd /></DCArtboard>
              <DCArtboard id="e3" label="3. overdue · act" width={phoneW} height={phoneH}><PhoneE3_InvoiceTap /></DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="display">
              <TweakToggle label="show brief card" value={tweaks.showBrief} onChange={(v) => setTweak('showBrief', v)} />
              <TweakToggle label="hand-drawn wobble" value={tweaks.wobble} onChange={(v) => setTweak('wobble', v)} />
              <TweakToggle label="state accent color" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />
            </TweakSection>
            <TweakSection title="data">
              <TweakToggle label="filled with example data" value={tweaks.filledData} onChange={(v) => setTweak('filledData', v)} />
              <div style={{ fontSize: 11, color: '#7a7468', lineHeight: 1.4 }}>
                empty-state versions live in storyboard A · 1 (empty day) and the dashboard KPIs zero out when off.
              </div>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
